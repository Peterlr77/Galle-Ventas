<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffb6c1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Galle Ventas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for cute icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1 id="header-title">🌸 Galle Ventas 🌸</h1>
        </header>

        <!-- Main Content Area where different views will be rendered -->
        <main id="main-content" class="content-area">
            <!-- Vistas se inyectarán aquí -->
            <div id="view-dashboard" class="view active">
                <div class="welcome-card" style="margin-bottom: 20px; position: relative;">
                    <!-- Settings Gear Icon -->
                    <button onclick="openSettingsModal()" style="position: absolute; top: 15px; left: 15px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.4rem; z-index: 5; transition: transform 0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <h2>¡Hola! ✨</h2>
                    <p>Bienvenida a Galle Ventas. Selecciona una opción o usa un acceso rápido.</p>
                </div>
                
                <h3 style="color:var(--primary-dark); margin-bottom: 10px; text-align:center;">Accesos Rápidos</h3>
                <div class="menu-grid">
                    <div class="menu-card" data-target="view-ventas" data-title="🛍️ Ventas">
                        <i class="fa-solid fa-store" style="color:var(--primary-dark);"></i>
                        <span style="color:var(--text-main);">Ventas</span>
                    </div>
                    <div class="menu-card" data-target="view-productos" data-title="✨ Productos">
                        <i class="fa-solid fa-box-open" style="color:var(--primary-dark);"></i>
                        <span style="color:var(--text-main);">Productos</span>
                    </div>
                    <div class="menu-card" data-target="view-precios" data-title="🏷️ Asignación de Precios">
                        <i class="fa-solid fa-tags" style="color:var(--primary-dark);"></i>
                        <span style="color:var(--text-main);">Precios</span>
                    </div>
                    <div class="menu-card" data-target="view-materias" data-title="📦 Materias Primas">
                        <i class="fa-solid fa-cubes" style="color:var(--primary-dark);"></i>
                        <span style="color:var(--text-main);">Materias</span>
                    </div>
                    <div class="menu-card" data-target="view-herramientas" data-title="⚒️ Herramientas Operativas">
                        <i class="fa-solid fa-hammer" style="color:var(--primary-dark);"></i>
                        <span style="color:var(--text-main);">Herramientas</span>
                    </div>
                    <div class="menu-card" data-target="view-historial" data-title="📜 Historial de Ventas">
                        <i class="fa-solid fa-clock-rotate-left" style="color:var(--primary-dark);"></i>
                        <span style="color:var(--text-main);">Historial</span>
                    </div>
                    <div class="menu-card" data-target="view-estadisticas" data-title="📊 Estadísticas" style="grid-column: span 2;">
                        <i class="fa-solid fa-chart-pie" style="color:var(--primary-dark);"></i>
                        <span style="color:var(--text-main);">Estadísticas</span>
                    </div>
                </div>
            </div>
            
            <div id="view-materias" class="view"></div>
            <div id="view-herramientas" class="view"></div>
            <div id="view-productos" class="view"></div>
            <div id="view-precios" class="view"></div>
            <div id="view-ventas" class="view"></div>
            <div id="view-historial" class="view"></div>
            <div id="view-estadisticas" class="view"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottom-nav">
            <button class="nav-item active" data-target="view-dashboard" data-title="🌸 Inicio">
                <i class="fa-solid fa-house"></i>
                <span>Inicio</span>
            </button>
            <button class="nav-item" data-target="view-ventas" data-title="🛍️ Ventas">
                <i class="fa-solid fa-store"></i>
                <span>Ventas</span>
            </button>
            <button class="nav-item" data-target="view-productos" data-title="✨ Productos">
                <i class="fa-solid fa-box-open"></i>
                <span>Productos</span>
            </button>
            <button class="nav-item" data-target="view-precios" data-title="🏷️ Asignación de Precios">
                <i class="fa-solid fa-tags"></i>
                <span>Precios</span>
            </button>
            <!-- Menú de más opciones para herramientas, materias, etc -->
            <button class="nav-item" id="btn-more-menu" data-title="⚙️ Más">
                <i class="fa-solid fa-bars"></i>
                <span>Más</span>
            </button>
        </nav>

        <!-- Expanded More Menu Overlay -->
        <div id="more-menu-overlay" class="overlay hidden">
            <div class="more-menu-content">
                <div class="menu-header">
                    <h2>⚙️ Más Opciones</h2>
                    <button class="btn-close-menu" id="btn-close-menu"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="menu-grid">
                    <button class="menu-card" data-target="view-materias" data-title="📦 Materias Primas">
                        <i class="fa-solid fa-cubes"></i>
                        <span>Materias Primas</span>
                    </button>
                    <button class="menu-card" data-target="view-herramientas" data-title="⚒️ Herramientas Operativas">
                        <i class="fa-solid fa-hammer"></i>
                        <span>Herramientas</span>
                    </button>
                    <button class="menu-card" data-target="view-historial" data-title="📜 Historial de Ventas">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <span>Historial</span>
                    </button>
                    <button class="menu-card" data-target="view-estadisticas" data-title="📊 Estadísticas">
                        <i class="fa-solid fa-chart-pie"></i>
                        <span>Estadísticas</span>
                    </button>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <script src="app.js"></script>
    <script src="materias.js"></script>
    <script src="herramientas.js"></script>
    <script src="productos.js"></script>
    <script src="precios.js"></script>
    <script src="ventas.js"></script>
    <script src="reportes.js"></script>
</body>
</html>
